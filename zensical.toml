[project]
site_name = "backstab"
site_description = "Game-theoretic analysis and Monte Carlo simulation of The Traitors"
docs_dir = "docs"
extra_javascript = [
    "javascripts/mathjax.js",
    "https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js"
]

nav = [
    {Home = "index.md"},
    {Tutorials = [
        {"First simulation" = "tutorials/first-simulation.md"}
    ]},
    {"How-to guides" = [
        {"Simulate a game" = "how-to/simulate-a-game.md"},
        {"Use different voting strategies" = "how-to/use-different-voting-strategies.md"},
        {"Analyse results" = "how-to/analyse-results.md"},
        {"Use Migdal recurrence" = "how-to/use-migdal-recurrence.md"},
    ]},
    {Reference = [
        {"API" = "reference/api.md"}
    ]},
    {Explanation = [
        {"The game model" = "explanation/game-model.md"},
        {"The FixedOrder protocol" = "explanation/fixed-order-protocol.md"},
    ]}
]

[project.theme]
variant = "modern"
logo = "assets/logo.svg"
favicon = "assets/favicon.svg"

features = [
  "content.code.copy",
  "content.tabs.link",
  "navigation.sections",
  "navigation.top",
]

[plugins.search]

[plugins.mkdocstrings.handlers.python]
paths = ["src"]

[plugins.mkdocstrings.handlers.python.options]
docstring_style = "numpy"
show_source = true
show_root_heading = true
show_root_full_path = false
members_order = "source"

[project.markdown_extensions]
pymdownx.superfences = {}
pymdownx.highlight = {}
pymdownx.arithmatex = { generic = true }
